<!DOCTYPE html>
<html>
<head>
    <title>Test Timetable API</title>
</head>
<body>
    <h1>Timetable API Test</h1>
    <div id="results"></div>
    
    <script>
        async function testAPI() {
            const resultsDiv = document.getElementById('results');
            
            try {
                // First login
                resultsDiv.innerHTML += '<p>Logging in...</p>';
                const loginResponse = await fetch('http://127.0.0.1:8000/api/auth/login/', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        username: 'Aksh',
                        password: 'Student@2026'
                    })
                });
                
                if (!loginResponse.ok) {
                    throw new Error(`Login failed: ${loginResponse.status}`);
                }
                
                const loginData = await loginResponse.json();
                resultsDiv.innerHTML += '<p>Login successful!</p>';
                
                // Then fetch timetables
                resultsDiv.innerHTML += '<p>Fetching timetables...</p>';
                const timetableResponse = await fetch('http://127.0.0.1:8000/api/academics/timetables/pdfs/', {
                    headers: {
                        'Authorization': `Bearer ${loginData.access}`,
                        'Content-Type': 'application/json',
                    }
                });
                
                if (!timetableResponse.ok) {
                    throw new Error(`Timetable fetch failed: ${timetableResponse.status}`);
                }
                
                const timetables = await timetableResponse.json();
                resultsDiv.innerHTML += `<p>Success! Found ${timetables.length} timetables:</p>`;
                
                timetables.forEach((t, i) => {
                    resultsDiv.innerHTML += `<p>${i+1}. ${t.title} (${t.academic_year}) - ${t.department_name || 'All Departments'}</p>`;
                });
                
            } catch (error) {
                resultsDiv.innerHTML += `<p style="color: red;">Error: ${error.message}</p>`;
                console.error('Test error:', error);
            }
        }
        
        // Run test when page loads
        testAPI();
    </script>
</body>
</html>
